<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RugArena Live</title>
<style>
body{margin:0;background:#050505;color:white;font-family:Arial;text-align:center}
.container{padding:22px 14px}

.card,.battle{background:#111;border:1px solid #333;border-radius:20px;padding:18px;margin:16px auto;max-width:680px}

.moon{background:#00ff88;color:#000}

.history{text-align:left;color:#ddd;line-height:1.7;font-size:14px}
.result{font-size:23px;font-weight:bold;color:#00ff88;margin-top:15px}
.ai{color:#aaa;font-style:italic;margin-top:14px}
a{color:#00ff88}
.small{color:#999;font-size:13px}
.token{border-bottom:1px solid #333;padding:12px 0}

</head>
