<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RugArena</title>

  <style>
    body{
      margin:0;
      background:#090909;
      color:white;
      font-family:Arial, sans-serif;
      text-align:center;
    }

    .container{
      padding:40px 20px;
    }

    h1{
      font-size:55px;
      color:#ff004c;
    }

    .battle{
      margin-top:50px;
      background:#141414;
      border:2px solid #ff004c;
      border-radius:20px;
      padding:30px;
      max-width:500px;
      margin-left:auto;
      margin-right:auto;
    }

    .coins{
      font-size:35px;
      margin-bottom:30px;
    }

    button{
      padding:15px 35px;
      font-size:22px;
      border:none;
      border-radius:12px;
      margin:10px;
      cursor:pointer;
      font-weight:bold;
    }

    .moon{
      background:#00ff88;
      color:black;
    }

    .dead{
      background:#ff004c;
      color:white;
    }

    .ai{
      margin-top:30px;
      color:#aaaaaa;
      font-style:italic;
    }
  </style>
</head>

<body>

<div class="container">

<h1>RugArena</h1>

<p>Vote. Roast. Survive.</p>

<div class="battle">

<div class="coins">
SENTINEL ⚔️ FARTCOIN
</div>

<button class="moon">🚀 MOON</button>

<button class="dead">💀 DEAD</button>

<div class="ai">
“AI detected maximum degen activity.”
</div>

</div>

</div>

</body>
</html>
